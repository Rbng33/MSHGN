# MSHGN V1 — Best results configuration
# ETTh1, avg masking {12.5%, 25%, 37.5%, 50%}, L=1024
# Result: MSE=0.0387, MAE=0.1301 | GPU: Tesla T4 16GB

model:
  variant: v1
  d_model: 128
  num_layers: 3
  num_scales: 3
  conv_kernel: 9
  n_heads: 4
  dropout: 0.1
  use_checkpoint: true
  use_amp: true

data:
  dataset: ETTh1
  seq_len: 1024
  features: M
  target: OT
  freq: h
  # ETTh1 standard splits (Informer protocol)
  # Train: 12 months | Val: 4 months | Test: 4 months

training:
  epochs: 20           # 5 used in initial run (val loss still descending)
  batch_size: 24       # auto-detected from GPU memory
  lr: 0.001
  weight_decay: 0.0001
  optimizer: AdamW
  scheduler: CosineAnnealing
  eta_min: 0.000001
  patience: 10
  masking_ratios: [0.125, 0.25, 0.375, 0.5]
  n_concat: 2          # ratios processed together per pass

hardware:
  gpu: "Tesla T4 16GB"
  peak_memory_gb: 14.2
  throughput: "5.42s/batch"
